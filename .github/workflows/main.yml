name: SafeHer CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t safeher-backend ./Backend

      - name: Build Frontend Docker Image
        run: docker build -t safeher-frontend ./Frontend
